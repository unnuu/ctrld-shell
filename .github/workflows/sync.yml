name: Sync HaGeZi to ControlD

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Profile to sync (leave empty for all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (preview only)'
        type: boolean
        required: false
        default: false
      no_cache:
        description: 'Force fresh download, ignore cache'
        type: boolean
        required: false
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Restore HaGeZi content cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/controld-hagezi-sync
          key: hagezi-content-${{ github.run_id }}
          restore-keys: hagezi-content-

      - name: Run sync
        env:
          CONTROLD_API_TOKEN: ${{ secrets.CONTROLD_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          args=""
          [ "${{ inputs.dry_run }}" = "true" ] && args="$args --dry-run"
          [ -n "${{ inputs.profile }}" ] && args="$args --profile ${{ inputs.profile }}"
          [ "${{ inputs.no_cache }}" = "true" ] && args="$args --no-cache"
          bash sync-hagezi.sh $args
