# .github/workflows/hagezi-sync.yml
name: Check and Sync HaGeZi to ControlD

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Profile to sync (leave empty for all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (preview only)'
        type: boolean
        required: false
        default: false
      no_cache:
        description: 'Force fresh download, ignore cache'
        type: boolean
        required: false
        default: false
      skip_check:
        description: 'Skip update check and sync unconditionally'
        type: boolean
        required: false
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.set-output.outputs.updates }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore HaGeZi content cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/controld-hagezi-sync
          key: hagezi-content-${{ github.run_id }}
          restore-keys: hagezi-content-

      - name: Check for upstream changes
        id: check
        if: ${{ inputs.skip_check != 'true' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./sync-hagezi.sh --check-updates --no-freshness
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Set output
        id: set-output
        run: |
          if [[ "${{ inputs.skip_check }}" == "true" ]]; then
            echo "updates=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.check.outputs.exit_code }}" == "0" ]]; then
            echo "updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "updates=false" >> "$GITHUB_OUTPUT"
          fi

  sync:
    needs: check
    if: ${{ needs.check.outputs.has_updates == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Restore HaGeZi content cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/controld-hagezi-sync
          key: hagezi-content-${{ github.run_id }}
          restore-keys: hagezi-content-

      - name: Run sync
        env:
          CONTROLD_API_TOKEN: ${{ secrets.CONTROLD_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          args=""
          [ "${{ inputs.dry_run }}" = "true" ] && args="$args --dry-run"
          [ -n "${{ inputs.profile }}" ] && args="$args --profile ${{ inputs.profile }}"
          [ "${{ inputs.no_cache }}" = "true" ] && args="$args --no-cache"
          bash sync-hagezi.sh $args
