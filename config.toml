# =============================================================================
# ControlD Hagezi Sync — Configuration
# =============================================================================
# Copy this file to config.toml and customize it.
# DO NOT commit config.toml if it contains your API token.
# =============================================================================

[settings]
# Your ControlD API Write Token.
# Get it from: https://controld.com/dashboard/api
# You can also leave this empty and use the CONTROLD_API_TOKEN env var.
api_token = ""

# Uncomment to skip the upstream freshness report at the end of each sync run.
# This avoids unauthenticated GitHub API calls (60 req/hr limit) — useful for CI.
show_freshness = false

# Set to true to preview changes without modifying anything.
dry_run = false

[profiles]
# Exact names of your ControlD profiles (case-sensitive).
names = ["Default", "DNS-Proxy-Auto", "DNS-Proxy-Local", "Restricted", "Windscribe"]

# =============================================================================
# FOLDER DEFINITIONS
# =============================================================================
# Each line under [folders] maps a friendly name → Hagezi JSON URL.
# The friendly name is what appears in your ControlD dashboard.
# =============================================================================
[folders]
"001" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/apple-private-relay-allow-folder.json"
"002" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/badware-hoster-folder.json"
"003" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-amazon-folder.json"
"004" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-apple-folder.json"
"005" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-huawei-folder.json"
"006" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-lgwebos-folder.json"
"007" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-microsoft-folder.json"
"008" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-roku-folder.json"
"009" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-samsung-folder.json"
"010" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-tiktok-folder.json"
"011" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-vivo-folder.json"
"012" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-xiaomi-folder.json"
"013" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/spam-idns-folder.json"
"014" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/spam-tlds-allow-folder.json"
"015" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/spam-tlds-folder.json"
"016" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/ultimate-known_issues-allow-folder.json"

# =============================================================================
# PROFILE → FOLDER MAPPINGS
# =============================================================================
# For each profile, list which folders (by friendly name) it should receive.
# Use the exact names from the [folders] section above.
# =============================================================================

[profile_folders]
Default         = ["001", "002", "003", "004", "005", "006", "007", "008", "009", "010", "011", "012", "013", "014", "015", "016"]
Dns-Proxy-Auto  = ["001", "002", "003", "004", "005", "006", "007", "008", "009", "010", "011", "012", "013", "014", "015", "016"]
Dns-Proxy-Local = ["001", "002", "003", "004", "005", "006", "007", "008", "009", "010", "011", "012", "013", "014", "015", "016"]
Restricted      = ["001", "002", "003", "004", "005", "006", "007", "008", "009", "010", "011", "012", "013", "014", "015", "016"]
Windscribe      = ["001", "002", "003", "004", "005", "006", "007", "008", "009", "010", "011", "012", "013", "014", "015", "016"]
