# =============================================================================
# ControlD Hagezi Sync — Configuration
# =============================================================================
# Copy this file to config.toml and customize it.
# DO NOT commit config.toml if it contains your API token.
# =============================================================================

[settings]
# Your ControlD API Write Token.
# Get it from: https://controld.com/dashboard/api
# You can also leave this empty and use the CONTROLD_API_TOKEN env var.
api_token = ""

# Uncomment to skip the upstream freshness report at the end of each sync run.
# This avoids unauthenticated GitHub API calls (60 req/hr limit) — useful for CI.
show_freshness = false

# Set to true to preview changes without modifying anything.
dry_run = false

[profiles]
# Exact names of your ControlD profiles (case-sensitive).
names = ["Default", "DNS-Proxy-Auto", "DNS-Proxy-Local", "Restricted", "Windscribe"]

# =============================================================================
# FOLDER DEFINITIONS
# =============================================================================
# Each line under [folders] maps a friendly name → Hagezi JSON URL.
# The friendly name is what appears in your ControlD dashboard.
# =============================================================================
[folders]
"01" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/apple-private-relay-allow-folder.json"
"02" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/badware-hoster-folder.json"
"03" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-amazon-folder.json"
"04" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-apple-folder.json"
"05" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-huawei-folder.json"
"06" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-lgwebos-folder.json"
"07" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-microsoft-folder.json"
"08" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-roku-folder.json"
"09" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-samsung-folder.json"
"10" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-tiktok-folder.json"
"11" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-vivo-folder.json"
"12" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/native-tracker-xiaomi-folder.json"
"13" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/spam-idns-folder.json"
"14" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/spam-tlds-allow-folder.json"
"15" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/spam-tlds-folder.json"
"16" = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/ultimate-known_issues-allow-folder.json"

# =============================================================================
# PROFILE → FOLDER MAPPINGS
# =============================================================================
# For each profile, list which folders (by friendly name) it should receive.
# Use the exact names from the [folders] section above.
# =============================================================================

[profile_folders]
Default         = ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "12", "13", "14", "15", "16"]
Dns-Proxy-Auto  = ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "12", "13", "14", "15", "16"]
Dns-Proxy-Local = ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "12", "13", "14", "15", "16"]
Restricted      = ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "12", "13", "14", "15", "16"]
Windscribe      = ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "12", "13", "14", "15", "16"]
